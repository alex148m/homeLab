apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend-prod
  namespace: argocd
spec:
  project: default
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  source:
    repoURL: https://github.com/alex148m/homeLab.git
    targetRevision: main
    path: k8s/overlays/prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true